name: FIREtrack CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

jobs:
  backend-quality:
    name: Backend lint, typecheck, pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync backend dependencies
        run: uv sync
        working-directory: backend

      - name: Backend lint (ruff)
        run: uv run ruff check app tests
        working-directory: backend

      - name: Backend typecheck (mypy)
        run: uv run mypy app
        working-directory: backend

      - name: Start backend test dependencies
        run: docker compose up -d db mailcatcher

      - name: Apply database migrations
        run: uv run bash scripts/prestart.sh
        working-directory: backend

      - name: Backend tests (pytest)
        run: uv run pytest -q
        working-directory: backend

      - name: Stop backend test dependencies
        if: always()
        run: docker compose down -v --remove-orphans

  frontend-quality:
    name: Frontend lint, typecheck, tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Frontend lint
        run: bun run --filter frontend lint:ci

      - name: Frontend typecheck
        run: bun run --filter frontend typecheck

      - name: Frontend unit tests
        run: bun run --filter frontend test

  axe-accessibility:
    name: Axe accessibility checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run axe-core playwright checks
        run: bun run --filter frontend test:e2e:axe

  lighthouse-ci:
    name: Lighthouse performance budgets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend for Lighthouse
        run: bun run --filter frontend build

      - name: Run Lighthouse mobile + desktop assertions
        run: bun run --filter frontend test:lighthouse

  contrast-lint:
    name: Contrast token lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate declared WCAG contrast pairs
        run: bun run check:contrast
